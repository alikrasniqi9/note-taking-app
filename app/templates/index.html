{% extends "base.html" %}

{% block content %}
<div class="app">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <div class="logo">📄</div>

        <ul>
            <li>
                <a href="{{ url_for('notes.index') }}">
                    <i class="fa-regular fa-file"></i> Të gjitha
                </a>
            </li>

            <li>
                <a href="{{ url_for('notes.category', category='personale') }}">
                    <i class="fa-solid fa-user"></i> Personale
                </a>
            </li>

            <li>
                <a href="{{ url_for('notes.category', category='pune') }}">
                    <i class="fa-solid fa-briefcase"></i> Punë
                </a>
            </li>

            <li>
                <a href="{{ url_for('notes.category', category='ide') }}">
                    <i class="fa-regular fa-lightbulb"></i> Ide
                </a>
            </li>
        </ul>

        <div class="notes-count">{{ notes|length }} SHËNIME</div>
        <hr>
    </div>

    <!-- NOTES LIST -->
    <div class="notes-list">

        <div class="notes-header">
            <h1>Shënimet</h1>
            <div class="actions">
                <form method="post" action="{{ url_for('notes.create') }}">
                    <button id="btn2" type="submit"><span>＋</span></button>
                </form>
            </div>
        </div>

        <form method="GET" action="{{ url_for('notes.index') }}">
            <input
                type="text"
                name="q"
                placeholder="Kërko"
                class="search"
                value="{{ request.args.get('q', '') }}"
            >
        </form>

        {% for note in notes %}
        <a href="{{ url_for('notes.get_note', id=note.id) }}">
            <div class="note-item  {% if selected_note and note.id == selected_note.id %}active{% endif %}">

                <div class="note-top">
                    <h3>{{ note.title[:15] }}</h3>
                    <form method="post" action="{{ url_for('notes.delete', id=note.id) }}">
                        <button type="submit" id="btn1"><i class="fa-regular fa-trash-can delete-icon"></i></button>
                    </form>
                </div>

                <span class="time">
                    {{ note.created_at.strftime('%H:%M') }}
                </span>

                <p>
                    {{ note.content[:72] }}
                </p>
            </div>
        </a>
        {% endfor %}
    </div>

    <!-- NOTE CONTENT -->
    <div class="note-view">

        <form class="note-form" method="POST" action="{{ url_for('notes.update', id=selected_note.id) if selected_note else url_for('notes.create')}}">
            <textarea name="title" class="title-editor" placeholder="Titulli..">{{ selected_note.title if selected_note else '' }}</textarea>
            <hr>
            <textarea name="content" class="note-editor" placeholder="Fillo të shkruash..">{{ selected_note.content if selected_note else '' }}</textarea>

            <div class="note-actions">

                <select name="category" class="category-select">
                    <option value="personale"
                        {% if selected_note and selected_note.category == 'personale' %}
                            selected
                        {% endif %}
                    >
                        Personale
                    </option>

                    <option value="pune"
                        {% if selected_note and selected_note.category == 'pune' %}
                            selected
                        {% endif %}
                    >
                        Punë
                    </option>

                    <option value="ide"
                        {% if selected_note and selected_note.category == 'ide' %}
                            selected
                        {% endif %}
                    >
                        Ide
                    </option>
                </select>

                <button type="submit" class="save-btn">
                    Save
                </button>

            </div>
        </form>

    </div>

</div>
{% endblock %}
